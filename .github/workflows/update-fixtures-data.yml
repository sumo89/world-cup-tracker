name: Update World Cup Fixtures Data

on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch worldcup26 fixtures
        run: npm run sync:data

      - name: Commit updated fixture data
        run: |
          if [[ -n "$(git status --porcelain public/data)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add public/data
            git commit -m "chore(data): refresh world cup fixtures"
            git push
          else
            echo "No data changes to commit."
          fi
